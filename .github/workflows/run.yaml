name: Run bot
on:
  schedule:
    - cron: '29 23,01,04,07,11,15,19 * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run-bots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        run: bash -c "$(curl -Lf https://astral.sh/uv/install.sh)"

      - name: Run the bots
        run: bash ./.github/run.sh
        env:
          MASTER_TOKEN: ${{ secrets.MASTER_TOKEN }}
          SLAVE_TOKEN: ${{ secrets.SLAVE_TOKEN }}
          BOT_SYNC_ENABLED: 0
